<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a6ef8"/>
      <stop offset="100%" stop-color="#0831d9"/>
    </radialGradient>
    <radialGradient id="gem" cx="38%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ffe48a"/>
      <stop offset="55%" stop-color="#ffc12e"/>
      <stop offset="100%" stop-color="#e89a00"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- blue XP-style background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>
  <!-- top highlight stripe like XP titlebar -->
  <rect x="0" y="0" width="32" height="6" rx="5" fill="rgba(255,255,255,0.18)"/>
  <!-- oracle diamond ◆ -->
  <path d="M16 5 L26 16 L16 27 L6 16 Z" fill="url(#gem)" stroke="#b8860b" stroke-width="0.8" filter="url(#glow)"/>
  <!-- inner facet lines for depth -->
  <path d="M16 5 L22 16 M16 5 L10 16 M6 16 L16 21 M26 16 L16 21" stroke="#b8860b" stroke-width="0.4" opacity="0.7"/>
  <!-- center eye glint -->
  <circle cx="16" cy="15.5" r="2.5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="15.2" cy="14.7" r="1" fill="rgba(255,255,255,0.9)"/>
</svg>
